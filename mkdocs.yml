site_name: PyPNM-CMTS-WebUI
site_description: Documentation for the PyPNM CMTS WebUI frontend
repo_name: PyPNM-CMTS-WebUI
docs_dir: docs
theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - content.code.copy
markdown_extensions:
  - admonition
  - attr_list
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - tables
  - toc:
      permalink: true
nav:
  - Home: index.md
  - User Guide:
      - Getting Started: user/getting-started.md
      - Install And Bootstrap: user/install-and-bootstrap.md
      - Runtime Configuration: user/runtime-configuration.md
      - Serving Group RxMER: user/serving-group-rxmer.md
      - Troubleshooting: user/troubleshooting.md
  - Development:
      - Workflow: development/workflow.md
      - CI Workflows: development/ci-workflows.md
  - Reference:
      - Architecture: architecture.md
      - Acronyms: acronyms.md
      - API Integration: api-integration.md
      - Environment: env.md
