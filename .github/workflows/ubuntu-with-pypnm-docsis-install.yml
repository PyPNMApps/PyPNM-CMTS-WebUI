name: Ubuntu With PyPNM-DOCSIS Install

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
      - "develop"
  pull_request:
    branches:
      - "main"
      - "develop"

permissions:
  contents: read

jobs:
  invalid-combo-guard:
    name: Invalid Combo Guardrail
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout PyPNM-CMTS-WebUI
        uses: actions/checkout@v4

      - name: Verify mixed profile/package is rejected
        run: |
          set +e
          output="$(./install.sh --with-pypnm-webui --with-pypnm-docsis-cmts 2>&1)"
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            echo "Expected invalid combo to fail, but command succeeded."
            exit 1
          fi
          echo "$output"
          echo "$output" | grep -q "Invalid product/backend option combination."

  combined-install:
    name: Ubuntu ${{ matrix.os }} · Python ${{ matrix.python-version }} · Profile ${{ matrix.profile }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - ubuntu-24.04
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
        profile:
          - pypnm-webui
          - pypnm-cmts-webui
        include:
          - profile: pypnm-webui
            backend-repo: PyPNMApps/PyPNM
            backend-dir: PyPNM
            stack-log: /tmp/pypnm-webui-stack.log
          - profile: pypnm-cmts-webui
            backend-repo: PyPNMApps/PyPNM-CMTS
            backend-dir: PyPNM-CMTS
            stack-log: /tmp/pypnm-cmts-webui-stack.log

    steps:
      - name: Checkout PyPNM-CMTS-WebUI
        uses: actions/checkout@v4
        with:
          path: PyPNM-CMTS-WebUI

      - name: Checkout backend repo
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.backend-repo }}
          path: ${{ matrix.backend-dir }}

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Make CI Helper Executable
        working-directory: PyPNM-CMTS-WebUI
        run: |
          chmod +x tools/install/ci-verify-with-pypnm-docsis.sh
          chmod +x tools/install/with-pypnm-docsis.sh
          chmod +x tools/install/start-local-stack.sh
          chmod +x tools/maintenance/kill-pypnm-webui.sh

      - name: Verify Combined Install
        working-directory: PyPNM-CMTS-WebUI
        run: |
          ./tools/install/ci-verify-with-pypnm-docsis.sh --profile ${{ matrix.profile }} --pypnm-path ../${{ matrix.backend-dir }}

      - name: Dump Combined Stack Logs On Failure
        if: failure()
        run: |
          cat ${{ matrix.stack-log }} || true

  uninstall-clean-state:
    name: Uninstall Clean State · Ubuntu ${{ matrix.os }} · Python ${{ matrix.python-version }} · Profile ${{ matrix.profile }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
        python-version:
          - "3.12"
        profile:
          - pypnm-webui
          - pypnm-cmts-webui
        include:
          - profile: pypnm-webui
            backend-repo: PyPNMApps/PyPNM
            backend-dir: PyPNM
          - profile: pypnm-cmts-webui
            backend-repo: PyPNMApps/PyPNM-CMTS
            backend-dir: PyPNM-CMTS

    steps:
      - name: Checkout PyPNM-CMTS-WebUI
        uses: actions/checkout@v4
        with:
          path: PyPNM-CMTS-WebUI

      - name: Checkout backend repo
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.backend-repo }}
          path: ${{ matrix.backend-dir }}

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Make Uninstall Helper Executable
        working-directory: PyPNM-CMTS-WebUI
        run: |
          chmod +x tools/install/ci-verify-uninstall.sh
          chmod +x tools/install/uninstall.sh
          chmod +x tools/install/with-pypnm-docsis.sh
          chmod +x tools/install/start-local-stack.sh

      - name: Verify Uninstall Clean State
        working-directory: PyPNM-CMTS-WebUI
        run: |
          ./tools/install/ci-verify-uninstall.sh --profile ${{ matrix.profile }} --pypnm-path ../${{ matrix.backend-dir }}
